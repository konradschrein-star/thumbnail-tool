services:
  postgres:
    image: postgres:16-alpine
    container_name: thumbnail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: thumbnail_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - thumbnail-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thumbnail_generator"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: thumbnail-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - thumbnail-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  thumbnail-pgdata:
    name: thumbnail-pgdata
  thumbnail-redis:
    name: thumbnail-redis
